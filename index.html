<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>TIC TAC TOE</h1>

    <div class="container">
        <div class="row">
            <div class="column" id="box1" onclick="playGame('box1')"></div>
            <div class="column" id="box2" onclick="playGame('box2')"></div>
            <div class="column" id="box3" onclick="playGame('box3')"></div>
        </div>
        <div class="row">
            <div class="column" id="box4" onclick="playGame('box4')"></div>
            <div class="column" id="box5" onclick="playGame('box5')"></div>
            <div class="column" id="box6" onclick="playGame('box6')"></div>
        </div>
        <div class="row">
            <div class="column" id="box7" onclick="playGame('box7')"></div>
            <div class="column" id="box8" onclick="playGame('box8')"></div>
            <div class="column" id="box9" onclick="playGame('box9')"></div>
        </div>
    </div>
    <div class="message" id="message"></div>

    <script src="app.js"></script>
</body>

</html>
